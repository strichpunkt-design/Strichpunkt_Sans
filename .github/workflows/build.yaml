name: Build font and specimen

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
    - name: Setup fontspector
      uses: fonttools/setup-fontspector@e880cbf998ccd5950c1afceac4efa872a056aa3f
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Install toolset
      run: |
        sudo apt-get update
        sudo apt-get install ttfautohint libcairo2-dev python3-cairo-dev pkg-config python3-dev
        sudo snap install yq
    - uses: actions/cache@v4
      with:
        path: ./venv/
        key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-venv-
    - name: Set artifact file name
      id: zip-name
      shell: bash
      # Set the archive name to repo name + "-fonts" e.g "radiocanadafonts-fonts.zip"
      run: |
        ZIP_NAME="$(echo '${{ github.repository }}' | awk -F '/' '{print $2}')-fonts"
        echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_OUTPUT

    - name: Build font
      run: make build
    - name: Check with fontspector (per family)
      run: |
        fontspector --profile googlefonts --skip-network "fonts/variable/StrichpunktSans[wdth,wght].ttf"
        fontspector --profile googlefonts --skip-network "fonts/variable/StrichpunktSans[wght].ttf"
        fontspector --profile googlefonts --skip-network "fonts/variable/StrichpunktSansWide[wght].ttf"
        fontspector --profile googlefonts --skip-network "fonts/variable/StrichpunktSansExp[wght].ttf"
      continue-on-error: true
    - name: Generate proofs
      run: |
        . venv/bin/activate
        python -m pip install -U pip wheel
        make proof
    - name: Set up test result site
      run: cp scripts/index.html out/index.html
    - name: Archive artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.zip-name.outputs.ZIP_NAME }}
        path: |
          fonts
          out
    outputs:
      zip_name: ${{ steps.zip-name.outputs.ZIP_NAME }}

  # There are two ways a release can be created: either by pushing a tag, or by
  # creating a release from the GitHub UI. Pushing a tag does not automatically
  # create a release, so we have to do that ourselves. However, creating a
  # release from the GitHub UI *does* push a tag, and we don't want to create
  # a new release in that case because one already exists!

  release:
    name: Release bundle
    if: contains(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ZIP_NAME: ${{ github.event.repository.name }}-fonts
      RELEASE_ZIP_NAME: ${{ github.event.repository.name }}-${{ github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
      - name: Use font artifacts from CI
        uses: actions/download-artifact@v5
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
      - name: Copy ARTICLE.en_us.html to release directory
        run: cp documentation/ARTICLE.en_us.html ${{ env.ZIP_NAME }}/ARTICLE.en_us.html
        continue-on-error: true
      - name: Copy OFL.txt to release directory
        run: cp OFL.txt ${{ env.ZIP_NAME }}/OFL.txt
      - name: Remove proof/test outputs from release
        run: rm -rf ${{ env.ZIP_NAME }}/out
      - name: Create release bundle
        run: mv ${{ env.ZIP_NAME }} ${{ env.RELEASE_ZIP_NAME }}; zip -r ${{ env.RELEASE_ZIP_NAME }}.zip ${{ env.RELEASE_ZIP_NAME }}
      - name: Check for release
        id: create_release
        run: |
          if ! gh release view ${{ github.ref_name }}; then
          git show -s --format=%B ${{ github.ref_name }} | tail -n +4 | gh release create ${{ github.ref_name }} -t ${{ github.ref_name }} -F -
          fi
      - name: Populate release
        run: |
          gh release upload ${{ github.ref_name }} ${{ env.RELEASE_ZIP_NAME }}.zip --clobber
      - name: Set release live
        run: |
          gh release edit ${{ github.ref_name }} --draft=false
